<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Summer Solstice Invitational · 2026</title>
  <meta name="description" content="Twelve players. Four rounds. Three of Colorado's finest tracks. June 19–21, 2026."/>

  <link rel="stylesheet" href="styles/tokens.css"/>
  <link rel="stylesheet" href="styles/site.css"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="scripts/tweaks-panel.jsx"></script>
  <script type="text/babel" src="scripts/logo.jsx"></script>
  <script type="text/babel" src="scripts/sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "logoVariant": "sunpeaks"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // reveal-on-scroll
      useEffect(() => {
        const els = document.querySelectorAll(".reveal");
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add("in");
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);

      return (
        <>
          <SiteNav/>
          <Hero logoVariant={tweaks.logoVariant}/>
          <Countdown/>
          <Format/>
          <Courses/>
          <Purse/>
          <Roster/>
          <Schedule/>
          <SiteFooter logoVariant={tweaks.logoVariant}/>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Logo">
              <TweakRadio
                label="Variant"
                value={tweaks.logoVariant}
                onChange={(v) => setTweak("logoVariant", v)}
                options={[
                  { value: "crest",     label: "Crest" },
                  { value: "sunpeaks",  label: "Sun + Peaks" },
                  { value: "monogram",  label: "Monogram" },
                ]}
              />
              <div style={{
                marginTop: 12, padding: 16, background: "#0F0F10",
                borderRadius: 8, display: "flex", justifyContent: "center"
              }}>
                <SSILogo variant={tweaks.logoVariant} size={140} dark={true}/>
              </div>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
